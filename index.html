<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Danyapez Shaker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --white: #fff;
      --gray: #555;
      --muted: #888;
      --danger: #aaa;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--white);
      font-family: "Press Start 2P", monospace;
      touch-action: none;
      overscroll-behavior: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
      user-select: none;
      touch-action: none;
    }

    .sprite {
      position: absolute;
      left: 0;
      top: 0;
      width: 140px;
      height: auto;
      max-width: calc(100vw - 20px);
      max-height: calc(100vh - 20px);
      object-fit: contain;
      transform: translate3d(0,0,0) rotate(0deg);
      transform-origin: 50% 50%;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      will-change: transform;
      outline: none !important;
      border: none !important;
      box-shadow: none !important;
      clip-path: inset(2px);
      -webkit-clip-path: inset(2px);
      background: transparent !important;
      image-rendering: pixelated;
    }

    .sprite.dragging,
    .sprite.selected,
    .sprite:hover,
    .sprite:active,
    .sprite:focus,
    .sprite:focus-visible {
      outline: none !important;
      outline-offset: 0 !important;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
    }

    .sprite.dragging {
      cursor: grabbing;
    }
    @media (hover: none) and (pointer: coarse) {
    }


    .motionButton {
      display: none !important;
    }

    @media (hover: none) and (pointer: coarse) {
      .motionButton {
        display: inline-block !important;
      }
    }

    .hiddenVideo {
      position: fixed;
      left: -99999px;
      top: -99999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .ui {
      position: fixed;
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      top: max(10px, env(safe-area-inset-top));
      z-index: 9999;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      padding: 0;
      background: transparent;
      border: 0;
    }

    button,
    label.fileButton {
      appearance: none;
      border: 1px solid #fff;
      border-radius: 0;
      background: #000;
      color: #fff;
      padding: 10px 10px;
      font: inherit;
      font-size: 9px;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    button:hover,
    label.fileButton:hover,
    button:focus-visible,
    label.fileButton:focus-visible {
      background: var(--gray);
      color: #fff;
      outline: none;
    }

    button:active,
    label.fileButton:active {
      background: var(--gray);
      transform: translateY(1px);
    }

    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    button.danger:hover,
    button.danger:focus-visible,
    button.danger:active {
      background: var(--gray);
      color: #fff;
      border-color: #fff;
    }

    input[type="file"] {
      position: fixed;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    .rangeWrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: min(100%, 260px);
      flex: 1 1 230px;
      color: #fff;
      font-size: 8px;
      line-height: 1;
      text-transform: uppercase;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #fff;
    }

    .status {
      flex: 1 1 100%;
      color: var(--muted);
      font-size: 8px;
      line-height: 1.55;
      padding-top: 3px;
    }

    .hint {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 100;
      padding: 0;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      pointer-events: none;
      font-size: 8px;
      text-transform: uppercase;
    }

    .hide {
      display: none;
    }

    @media (max-width: 520px) {
      .panel {
        gap: 6px;
      }

      button,
      label.fileButton {
        padding: 9px 8px;
        font-size: 8px;
      }

      .rangeWrap {
        min-width: min(100%, 210px);
        font-size: 7px;
      }

      .status,
      .hint {
        font-size: 7px;
      }

      .sprite {
        width: 90px;
        max-width: calc(100vw - 20px);
        max-height: calc(100vh - 20px);
      }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="Media play field"></main>

  <div class="ui">
    <div class="panel">
      <label class="fileButton" for="fileInput">MEDIA</label>
      <input id="fileInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp,video/webm,.png,.jpg,.jpeg,.gif,.webp,.webm" multiple />

      <button id="motionButton" class="motionButton" type="button">SHAKER</button>
      <button id="resetButton" type="button">RESET</button>

      <div class="rangeWrap">
        <span>SHAKE</span>
        <input id="powerRange" type="range" min="0.6" max="5" step="0.1" value="2.8" />
        <span id="powerValue">2.8</span>
      </div>

      <div class="rangeWrap">
        <span>GRAV</span>
        <input id="gravityRange" type="range" min="0" max="2.5" step="0.05" value="0.45" />
        <span id="gravityValue">0.45</span>
      </div>

      <div id="status" class="status">
        MEDIA / SHAKE / DIFFERENT PHYSICS
      </div>
    </div>
  </div>

  <div id="hint" class="hint">
    DEFAULT MEDIA LOADED<br>
    RESET = CLEAR
  </div>

      // V23: targeted white arms legs cleanup + accelerometer tilt, still no endless spinning.
      const collisionRestitution = 0.32;
      const wallRestitutionX = 0.30;
      const wallRestitutionY = 0.22;
      const airDamping = 0.972;
      const rotationDamping = 0.60;

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const rnd = (min, max) => min + Math.random() * (max - min);

      function setStatus(text) {
        statusEl.textContent = text;

      function updateHint() {
        hint.classList.toggle("hide", sprites.length > 0);

      function selectSprite(sprite) {
        selected = sprite;

      function isVideoType(mimeOrName = "") {
        const value = String(mimeOrName).toLowerCase();
        return value.startsWith("video/") || value.endsWith(".webm");
      }

      function isSupported(file) {
        const name = file.name.toLowerCase();
        return file.type === "image/png" ||
               file.type === "image/jpeg" ||
               file.type === "image/pjpeg" ||
               file.type === "image/gif" ||
               file.type === "image/webp" ||
               file.type === "video/webm" ||
               name.endsWith(".png") ||
               name.endsWith(".jpg") ||
               name.endsWith(".jpeg") ||
               name.endsWith(".gif") ||
               name.endsWith(".webp") ||
               name.endsWith(".webm");
      }

      function updateSpriteMetrics(sprite) {
        const rect = sprite.el.getBoundingClientRect();
        const w = rect.width || sprite.w || 140;
        const h = rect.height || sprite.h || 140;

        sprite.w = w;
        sprite.h = h;

        sprite.r = Math.max(18, Math.max(w, h) * 0.36);
        sprite.mass = Math.max(1, sprite.r * sprite.r);
      }

      function fitInside(sprite) {
        updateSpriteMetrics(sprite);
        sprite.x = clamp(sprite.x, 0, Math.max(0, window.innerWidth - sprite.w));
        sprite.y = clamp(sprite.y, 0, Math.max(0, window.innerHeight - sprite.h));
      }

      function cx(sprite) {
        return sprite.x + sprite.w / 2;
      }

      function cy(sprite) {
        return sprite.y + sprite.h / 2;
      }

      function renderSprite(sprite) {
        sprite.el.style.transform =
          `translate3d(${sprite.x}px, ${sprite.y}px, 0) rotate(${sprite.rot}deg)`;
      }

      function removeWhiteToAlpha(imageData, w, h, threshold = 238) {
        const data = imageData.data;

        function isAlmostWhite(index) {
          const p = index * 4;
          const r = data[p];
          const g = data[p + 1];
          const b = data[p + 2];
          const a = data[p + 3];

          if (a === 0) return false;

          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);

          return r >= 238 &&
                 g >= 238 &&
                 b >= 238 &&
                 (max - min) <= 35;
        }

        function isSoftWhite(index) {
          const p = index * 4;
          const r = data[p];
          const g = data[p + 1];
          const b = data[p + 2];
          const a = data[p + 3];

          if (a === 0) return false;

          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;

          return lum >= 218 && (max - min) <= 48;
        }

        function inTargetZone(x, y) {
          const sideArms = (x < w * 0.36 || x > w * 0.64) && y > h * 0.26;
          const lowerLegs = y > h * 0.56;
          const veryBottom = y > h * 0.70;

          return sideArms || lowerLegs || veryBottom;
        }

        function inFaceCenter(x, y) {
          return x > w * 0.20 &&
                 x < w * 0.80 &&
                 y > h * 0.06 &&
                 y < h * 0.58;
        }

        // 1) Remove only almost pure white pixels in arms/legs zones.
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const index = y * w + x;

            if (!isAlmostWhite(index)) continue;
            if (!inTargetZone(x, y)) continue;

            const lowerLegs = y > h * 0.56;

            if (inFaceCenter(x, y) && !lowerLegs) continue;

            data[index * 4 + 3] = 0;
          }
        }

        // 2) Softer tiny cluster cleanup only at bottom.
        const seen = new Uint8Array(w * h);

        function collectComponent(startIndex) {
          const queue = [startIndex];
          const component = [];
          seen[startIndex] = 1;

          let head = 0;

          while (head < queue.length) {
            const index = queue[head++];
            component.push(index);

            const x = index % w;
            const y = Math.floor(index / w);

            for (const item of [[x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]]) {
              const nx = item[0];
              const ny = item[1];

              if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;

              const ni = ny * w + nx;
              if (seen[ni]) continue;

              seen[ni] = 1;
              if (isSoftWhite(ni) && ny > h * 0.56) queue.push(ni);
            }
          }

          return component;
        }

        for (let index = 0; index < w * h; index++) {
          const x = index % w;
          const y = Math.floor(index / w);

          if (seen[index]) continue;
          if (y <= h * 0.56) continue;
          if (!isSoftWhite(index)) continue;

          const component = collectComponent(index);
          const area = component.length;

          let minX = w;
          let maxX = 0;
          let minY = h;
          let maxY = 0;

          for (const pixel of component) {
            const px = pixel % w;
            const py = Math.floor(pixel / w);

            if (px < minX) minX = px;
            if (px > maxX) maxX = px;
            if (py < minY) minY = py;
            if (py > maxY) maxY = py;
          }

          const width = maxX - minX + 1;
          const height = maxY - minY + 1;

          if (area <= 70 && (width <= 12 || height <= 12)) {
            for (const pixel of component) {
              data[pixel * 4 + 3] = 0;
            }
          }
        }

        return imageData;
      }

      function drawVideoSprite(sprite) {
        if (!sprite.video || sprite.video.readyState < 2) return;

        const ctx = sprite.canvasCtx;
        const off = sprite.offscreen;
        const offCtx = sprite.offscreenCtx;
        const size = videoCanvasSize;

        offCtx.clearRect(0, 0, size, size);
        offCtx.drawImage(sprite.video, 0, 0, size, size);

        let frame;
        try {
          frame = offCtx.getImageData(0, 0, size, size);
        } catch (error) {
          return;
        }

        removeWhiteToAlpha(frame, size, size, 238);
        ctx.clearRect(0, 0, size, size);
        ctx.putImageData(frame, 0, 0);
      }

      function makeMediaElement(src, mime, name) {
        if (isVideoType(mime || name)) {
          const canvas = document.createElement("canvas");
          canvas.width = videoCanvasSize;
          canvas.height = videoCanvasSize;
          canvas.className = "sprite";
          canvas.style.zIndex = ++z;

          const video = document.createElement("video");
          video.className = "hiddenVideo";
          video.src = src;
          video.muted = true;
          video.loop = true;
          video.autoplay = true;
          video.playsInline = true;
          video.setAttribute("playsinline", "");
          video.setAttribute("webkit-playsinline", "");
          video.preload = "auto";
          video.disablePictureInPicture = true;
          video.controls = false;

          const offscreen = document.createElement("canvas");
          offscreen.width = videoCanvasSize;
          offscreen.height = videoCanvasSize;

          return {
            el: canvas,
            video,
            canvasCtx: canvas.getContext("2d", { willReadFrequently: true }),
            offscreen,
            offscreenCtx: offscreen.getContext("2d", { willReadFrequently: true }),
            isCanvasVideo: true
          };
        }

        const img = document.createElement("img");
        img.className = "sprite";
        img.src = src;
        img.alt = name || "MEDIA";
        img.draggable = false;
        img.style.zIndex = ++z;

        return { el: img, video: null, isCanvasVideo: false };
      }


      function getSpawnPosition(index) {
        const isMobile = window.innerWidth <= 520;
        const margin = isMobile ? 10 : 16;
        const topOffset = isMobile ? 120 : 70;
        const item = isMobile ? 96 : 158;
        const usableW = Math.max(item, window.innerWidth - margin * 2);
        const cols = Math.max(1, Math.floor(usableW / item));
        const col = index % cols;
        const row = Math.floor(index / cols);
        const jitter = isMobile ? 4 : 10;

        return {
          x: margin + col * item + rnd(-jitter, jitter),
          y: topOffset + row * item + rnd(-jitter, jitter)
        };
      }

      function separateInitialOverlaps(sprite) {
        const maxAttempts = 40;

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          fitInside(sprite);

          let moved = false;

          for (const other of sprites) {
            if (other === sprite) continue;

            const dx = cx(sprite) - cx(other);
            const dy = cy(sprite) - cy(other);
            const minDist = sprite.r + other.r + 26;
            const d2 = dx * dx + dy * dy;

            if (d2 < minDist * minDist) {
              const d = Math.sqrt(d2) || 1;
              sprite.x += (dx / d) * 26 + rnd(-4, 4);
              sprite.y += (dy / d) * 26 + rnd(-4, 4);
              moved = true;
            }
          }

          if (!moved) break;
        }

        fitInside(sprite);
      }


      function addSprite(src, name = "MEDIA", mime = "", objectUrl = null) {
        const spawn = getSpawnPosition(sprites.length);
        const media = makeMediaElement(src, mime, name);
        const el = media.el;

        const sprite = {
          el,
          video: media.video,
          canvasCtx: media.canvasCtx || null,
          offscreen: media.offscreen || null,
          offscreenCtx: media.offscreenCtx || null,
          isCanvasVideo: media.isCanvasVideo || false,
          objectUrl,
          x: spawn.x,
          y: spawn.y,
          vx: rnd(-0.8, 0.8),
          vy: rnd(-0.8, 0.8),
          rot: rnd(-18, 18),
          vr: rnd(-0.08, 0.08),
          gravityScale: rnd(0.72, 1.34),
          airScale: rnd(0.955, 0.982),
          bounceX: rnd(0.18, 0.42),
          bounceY: rnd(0.12, 0.36),
          spinFactor: rnd(0.0025, 0.009),
          spinDamping: rnd(0.68, 0.86),
          maxSpinLocal: rnd(0.12, 0.34),
          settleAngle: rnd(-24, 24),
          w: 140,
          h: 140,
          r: 50,
          mass: 2500,
          dragging: false,
          pointerId: null,
          dragOffsetX: 0,
          dragOffsetY: 0,
          lastDragX: 0,
          lastDragY: 0,
          lastDragT: 0
        };

        function afterLoaded() {
          fitInside(sprite);
          renderSprite(sprite);

          if (sprite.video) {
            const playPromise = sprite.video.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(() => {});
            }
          }
        }

        if (sprite.isCanvasVideo) {
          stage.appendChild(sprite.video);
          sprite.video.addEventListener("loadedmetadata", afterLoaded, { once: true });
        } else {
          el.addEventListener("load", afterLoaded, { once: true });
        }

        el.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          el.setPointerCapture(event.pointerId);

          if (sprite.video) {
            const playPromise = sprite.video.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(() => {});
            }
          }

          sprite.dragging = true;
          sprite.pointerId = event.pointerId;
          sprite.el.classList.add("dragging");
          sprite.el.style.zIndex = ++z;

          const rect = el.getBoundingClientRect();
          sprite.dragOffsetX = event.clientX - rect.left;
          sprite.dragOffsetY = event.clientY - rect.top;
          sprite.lastDragX = event.clientX;
          sprite.lastDragY = event.clientY;
          sprite.lastDragT = performance.now();

          sprite.vx = 0;
          sprite.vy = 0;
          sprite.vr = 0;

          selectSprite(sprite);
        });

        el.addEventListener("pointermove", (event) => {
          if (!sprite.dragging || event.pointerId !== sprite.pointerId) return;
          event.preventDefault();

          const now = performance.now();
          const dt = Math.max(16, now - sprite.lastDragT);

          const nextX = event.clientX - sprite.dragOffsetX;
          const nextY = event.clientY - sprite.dragOffsetY;

          sprite.vx = (event.clientX - sprite.lastDragX) / dt * 11;
          sprite.vy = (event.clientY - sprite.lastDragY) / dt * 11;
          sprite.vr = clamp(sprite.vx * sprite.spinFactor, -sprite.maxSpinLocal, sprite.maxSpinLocal);

          sprite.x = nextX;
          sprite.y = nextY;

          fitInside(sprite);
          renderSprite(sprite);

          sprite.lastDragX = event.clientX;
          sprite.lastDragY = event.clientY;
          sprite.lastDragT = now;
        });

        function endDrag(event) {
          if (!sprite.dragging || event.pointerId !== sprite.pointerId) return;
          sprite.dragging = false;
          sprite.pointerId = null;
          sprite.el.classList.remove("dragging");
        }

        el.addEventListener("pointerup", endDrag);
        el.addEventListener("pointercancel", endDrag);
        el.addEventListener("lostpointercapture", () => {
          sprite.dragging = false;
          sprite.pointerId = null;
          sprite.el.classList.remove("dragging");
        });

        el.addEventListener("dblclick", () => {
          removeSprite(sprite);
        });

        sprites.push(sprite);
        stage.appendChild(el);
        separateInitialOverlaps(sprite);

        if (sprite.video) {
          const playPromise = sprite.video.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {});
          }
        }

        selectSprite(sprite);
        updateHint();
        renderSprite(sprite);

        if (sprite.isCanvasVideo) {
          drawVideoSprite(sprite);
        }
      }

      function removeSprite(sprite) {
        const i = sprites.indexOf(sprite);
        if (i !== -1) sprites.splice(i, 1);

        if (sprite.video) {
          sprite.video.pause();
          sprite.video.removeAttribute("src");
          sprite.video.load();
          if (sprite.video.parentNode) sprite.video.parentNode.removeChild(sprite.video);
        }

        if (sprite.el && sprite.el.parentNode) {
          sprite.el.parentNode.removeChild(sprite.el);
        }

        if (sprite.objectUrl) {
          URL.revokeObjectURL(sprite.objectUrl);
        }

        if (selected === sprite) {
          selected = sprites[sprites.length - 1] || null;
        }

        updateHint();
      }

      function clearAllSprites() {
        while (sprites.length) {
          removeSprite(sprites[0]);
        }
        selected = null;
        updateHint();
      }

      function loadDefaultAssets() {
        for (const asset of DEFAULT_ASSETS) {
          addSprite(asset.src, asset.name, asset.mime);
        }
        setStatus(`DEFAULT LOADED: ${DEFAULT_ASSETS.length}`);
      }

      fileInput.addEventListener("change", () => {
        const files = [...fileInput.files];
        const supported = files.filter(isSupported);

        if (!supported.length) {
          setStatus("PNG/JPG/JPEG/GIF/WEBP/WEBM ONLY");
          fileInput.value = "";
          return;
        }

        for (const file of supported) {
          const url = URL.createObjectURL(file);
          addSprite(url, file.name, file.type, url);
        }

        setStatus(`LOADED: ${supported.length}`);
        fileInput.value = "";
      });

      async function enableMotion() {
        try {
          if (typeof DeviceMotionEvent !== "undefined" &&
              typeof DeviceMotionEvent.requestPermission === "function") {
            const permission = await DeviceMotionEvent.requestPermission();

            if (permission !== "granted") {
              setStatus("SHAKER DENIED");
              return;
            }
          }

          if (typeof DeviceOrientationEvent !== "undefined" &&
              typeof DeviceOrientationEvent.requestPermission === "function") {
            try {
              const orientationPermission = await DeviceOrientationEvent.requestPermission();

              if (orientationPermission && orientationPermission !== "granted") {
                // Safari sometimes returns undefined for orientation, so don't hard fail.
              }
            } catch (error) {
              // Some browsers expose the method but still block it.
            }
          }

          // Every press recalibrates the current phone angle as neutral.
          orientationBase = null;
          orientationActive = false;
          tiltTargetX = 0;
          tiltTargetY = 0;
          tiltX = 0;
          tiltY = 0;

          if (!motionEnabled) {
            window.addEventListener("devicemotion", onDeviceMotion, { passive: true });
            window.addEventListener("deviceorientation", onDeviceOrientation, { passive: true });
            motionEnabled = true;
          }

          motionButton.textContent = "SHAKER ON";
          setStatus("SHAKER ON / TILT READY");
        } catch (error) {
          setStatus("HTTPS REQUIRED");
          console.error(error);
        }
      }

      motionButton.addEventListener("click", enableMotion);


      function getScreenAngle() {
        if (screen.orientation && typeof screen.orientation.angle === "number") {
          return screen.orientation.angle;
        }

        if (typeof window.orientation === "number") {
          return window.orientation;
        }

        return 0;
      }

      function applyScreenOrientation(x, y) {
        const angle = ((getScreenAngle() % 360) + 360) % 360;

        if (angle === 90) return { x: y, y: -x };
        if (angle === 270) return { x: -y, y: x };
        if (angle === 180) return { x: -x, y: -y };

        return { x, y };
      }

      function updateTiltTarget(rawX, rawY, source = "TILT") {
        const mapped = applyScreenOrientation(rawX, rawY);

        // Small dead zone so objects don't constantly drift from tiny sensor noise.
        const deadZone = 1.2;

        let x = Math.abs(mapped.x) < deadZone ? 0 : mapped.x;
        let y = Math.abs(mapped.y) < deadZone ? 0 : mapped.y;

        // Stronger reaction to small phone tilts.
        tiltTargetX = clamp(x * 0.050 * power, -1.65, 1.65);
        tiltTargetY = clamp(y * 0.044 * power, -1.45, 1.45);

        const now = performance.now();

        if (now - lastTiltStatusAt > 420) {
          lastTiltStatusAt = now;
          setStatus(`${source} ${x.toFixed(1)} / ${y.toFixed(1)}`);
        }
      }

      function onDeviceOrientation(event) {
        const gamma = Number(event.gamma || 0); // left/right tilt
        const beta = Number(event.beta || 0);   // front/back tilt

        if (!Number.isFinite(gamma) || !Number.isFinite(beta)) return;

        // First real reading after pressing SHAKER becomes neutral position.
        if (!orientationBase) {
          orientationBase = { gamma, beta };
          orientationActive = true;
          setStatus("TILT CALIBRATED");
          return;
        }

        const dx = gamma - orientationBase.gamma;
        const dy = beta - orientationBase.beta;

        orientationActive = true;
        updateTiltTarget(dx, dy, "TILT");
      }

      function onDeviceMotion(event) {
        const a = event.accelerationIncludingGravity || event.acceleration;
        if (!a) return;

        const x = Number(a.x || 0);
        const y = Number(a.y || 0);
        const zed = Number(a.z || 0);
        const now = performance.now();

        if (!lastMotion) {
          lastMotion = { x, y, z: zed, t: now };
          return;
        }

        const dx = x - lastMotion.x;
        const dy = y - lastMotion.y;
        const dz = zed - lastMotion.z;
        const jerk = Math.sqrt(dx * dx + dy * dy + dz * dz);

        // Chrome/iPhone sometimes gives motion but not stable orientation.
        // In that case use accelerationIncludingGravity as tilt fallback.
        if (!orientationActive) {
          updateTiltTarget(-x * 1.35, y * 1.35, "ACCEL");
        }

        // More sensitive shake impulse.
        if (jerk > 2.8 && now - lastShakeAt > 55) {
          lastShakeAt = now;
          const impulse = clamp((jerk - 1.8) * 1.45 * power, 4.5, 36);

          for (const sprite of sprites) {
            if (sprite.dragging) continue;

            sprite.vx += rnd(-impulse, impulse) + dx * 0.42 * power;
            sprite.vy += rnd(-impulse, impulse) - dy * 0.42 * power;
            sprite.vr += rnd(-0.08, 0.08) * power * sprite.spinFactor * 35;
            sprite.vr = clamp(sprite.vr, -sprite.maxSpinLocal, sprite.maxSpinLocal);
          }

          setStatus(`SHAKE ${jerk.toFixed(1)} / TILT ACTIVE`);
        }

        lastMotion = { x, y, z: zed, t: now };
      }

      function collideSprites() {
        const n = sprites.length;

        for (let i = 0; i < n; i++) {
          const a = sprites[i];

          for (let j = i + 1; j < n; j++) {
            const b = sprites[j];

            const ax = cx(a);
            const ay = cy(a);
            const bx = cx(b);
            const by = cy(b);

            let nx = bx - ax;
            let ny = by - ay;
            let distSq = nx * nx + ny * ny;
            const minDist = a.r + b.r;

            if (distSq >= minDist * minDist) continue;

            let dist = Math.sqrt(distSq);

            if (dist < 0.0001) {
              const angle = rnd(0, Math.PI * 2);
              nx = Math.cos(angle);
              ny = Math.sin(angle);
              dist = 1;
            } else {
              nx /= dist;
              ny /= dist;
            }

            const overlap = minDist - dist;
            const aLocked = a.dragging;
            const bLocked = b.dragging;
            const separationSoftness = 0.92;

            if (aLocked && !bLocked) {
              b.x += nx * overlap * separationSoftness;
              b.y += ny * overlap * separationSoftness;
            } else if (!aLocked && bLocked) {
              a.x -= nx * overlap * separationSoftness;
              a.y -= ny * overlap * separationSoftness;
            } else if (!aLocked && !bLocked) {
              const totalMass = a.mass + b.mass;
              const aShare = b.mass / totalMass;
              const bShare = a.mass / totalMass;

              a.x -= nx * overlap * aShare * separationSoftness;
              a.y -= ny * overlap * aShare * separationSoftness;
              b.x += nx * overlap * bShare * separationSoftness;
              b.y += ny * overlap * bShare * separationSoftness;
            }

            const rvx = b.vx - a.vx;
            const rvy = b.vy - a.vy;
            const velAlongNormal = rvx * nx + rvy * ny;

            if (velAlongNormal > 0) continue;

            const invMassA = aLocked ? 0 : 1 / a.mass;
            const invMassB = bLocked ? 0 : 1 / b.mass;
            const invMassSum = invMassA + invMassB;

            if (invMassSum === 0) continue;

            const impulse = -(1 + collisionRestitution) * velAlongNormal / invMassSum;
            const impulseX = impulse * nx;
            const impulseY = impulse * ny;

            if (!aLocked) {
              a.vx -= impulseX * invMassA;
              a.vy -= impulseY * invMassA;
            }

            if (!bLocked) {
              b.vx += impulseX * invMassB;
              b.vy += impulseY * invMassB;
            }

            if (!aLocked) a.vr = clamp((a.vr * 0.35) - impulseX * 0.00025 * a.spinFactor * 100, -a.maxSpinLocal, a.maxSpinLocal);
            if (!bLocked) b.vr = clamp((b.vr * 0.35) + impulseX * 0.00025 * b.spinFactor * 100, -b.maxSpinLocal, b.maxSpinLocal);

            a.vx *= collisionDamping;
            a.vy *= collisionDamping;
            b.vx *= collisionDamping;
            b.vy *= collisionDamping;
          }
        }

        for (const sprite of sprites) {
          const maxX = Math.max(0, window.innerWidth - sprite.w);
          const maxY = Math.max(0, window.innerHeight - sprite.h);
          sprite.x = clamp(sprite.x, 0, maxX);
          sprite.y = clamp(sprite.y, 0, maxY);
        }
      }

      function bounceFromWalls(sprite) {
        const maxX = Math.max(0, window.innerWidth - sprite.w);
        const maxY = Math.max(0, window.innerHeight - sprite.h);

        if (sprite.x < 0) {
          sprite.x = 0;
          sprite.vx = Math.abs(sprite.vx) * sprite.bounceX;
          sprite.vr = clamp(Math.abs(sprite.vx) * sprite.spinFactor, -sprite.maxSpinLocal, sprite.maxSpinLocal);
        } else if (sprite.x > maxX) {
          sprite.x = maxX;
          sprite.vx = -Math.abs(sprite.vx) * sprite.bounceX;
          sprite.vr = clamp(-Math.abs(sprite.vx) * sprite.spinFactor, -sprite.maxSpinLocal, sprite.maxSpinLocal);
        }

        if (sprite.y < 0) {
          sprite.y = 0;
          sprite.vy = Math.abs(sprite.vy) * sprite.bounceY;
          sprite.vr = clamp(sprite.vx * sprite.spinFactor, -sprite.maxSpinLocal, sprite.maxSpinLocal);
        } else if (sprite.y > maxY) {
          sprite.y = maxY;
          sprite.vy = -Math.abs(sprite.vy) * sprite.bounceY;

          if (Math.abs(sprite.vy) < gravity * 2.8 + 0.65) {
            sprite.vy = 0;
            sprite.rot += (sprite.settleAngle - sprite.rot) * 0.035;
          } else {
            sprite.vr = clamp(sprite.vx * sprite.spinFactor, -sprite.maxSpinLocal, sprite.maxSpinLocal);
          }
        }
      }

      function tick() {
        for (const sprite of sprites) {
          if (sprite.isCanvasVideo) {
            drawVideoSprite(sprite);
          }

          if (sprite.dragging) continue;

          if (motionEnabled) {
            // Smooth continuous tilt force, like objects sliding with accelerometer.
            tiltX += (tiltTargetX - tiltX) * 0.22;
            tiltY += (tiltTargetY - tiltY) * 0.22;

            sprite.vx += tiltX * sprite.gravityScale;
            sprite.vy += tiltY * sprite.gravityScale;
          }

          sprite.vy += gravity * sprite.gravityScale;

          sprite.x += sprite.vx;
          sprite.y += sprite.vy;
          sprite.rot += sprite.vr;

          sprite.vx *= sprite.airScale;
          sprite.vy *= sprite.airScale;
          sprite.vr = clamp(sprite.vr * sprite.spinDamping, -sprite.maxSpinLocal, sprite.maxSpinLocal);

          bounceFromWalls(sprite);

          if (Math.abs(sprite.vx) < 0.018) sprite.vx = 0;
          if (Math.abs(sprite.vy) < 0.018) sprite.vy = 0;
          if (Math.abs(sprite.vr) < 0.025) sprite.vr = 0;
        }

        collideSprites();

        for (const sprite of sprites) {
          renderSprite(sprite);
        }

        requestAnimationFrame(tick);
      }

      resetButton.addEventListener("click", () => {
        clearAllSprites();
        setStatus("CLEARED / LOAD YOUR MEDIA");
      });

      if (deleteButton) {
        deleteButton.addEventListener("click", () => {
          if (!selected) {
            setStatus("SELECT FILE FIRST");
            return;
          }

          removeSprite(selected);
          setStatus("DELETED");
        });
      }

      powerRange.addEventListener("input", () => {
        power = Number(powerRange.value);
        powerValue.textContent = power.toFixed(1);
        setStatus(`SHAKE ${power.toFixed(1)}`);
      });

      gravityRange.addEventListener("input", () => {
        gravity = Number(gravityRange.value);
        gravityValue.textContent = gravity.toFixed(2);
        setStatus(`GRAV ${gravity.toFixed(2)}`);
      });

      window.addEventListener("resize", () => {
        for (const sprite of sprites) {
          fitInside(sprite);
          renderSprite(sprite);
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.code !== "Space") return;

        for (const sprite of sprites) {
          if (sprite.dragging) continue;

          sprite.vx += rnd(-18, 18) * power;
          sprite.vy += rnd(-18, 18) * power;
          sprite.vr += rnd(-0.09, 0.09) * power;
          sprite.vr = clamp(sprite.vr, -sprite.maxSpinLocal, sprite.maxSpinLocal);
        }

        setStatus("SPACE SHAKE");
      });

      loadDefaultAssets();
      tick();
      updateHint();
    })();
  </script>
</body>
</html>
