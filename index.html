<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>PNG GIF Shaker</title>

  <!-- Шрифт грузится из Google Fonts. Если нужен полностью офлайн-вариант, можно заменить на локальный font-face. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --white: #fff;
      --gray: #555;
      --gray-2: #222;
      --muted: #888;
      --danger: #aaa;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--white);
      font-family: "Press Start 2P", monospace;
      touch-action: none;
      overscroll-behavior: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
      user-select: none;
      touch-action: none;
    }

    .sprite {
      position: absolute;
      left: 0;
      top: 0;
      width: 140px;
      height: auto;
      max-width: calc(100vw - 20px);
      max-height: calc(100vh - 20px);
      object-fit: contain;
      transform: translate3d(0,0,0) rotate(0deg);
      transform-origin: 50% 50%;
      cursor: grab;
      touch-action: none;
      user-select: none;
      will-change: transform;
    }

    .sprite.dragging {
      cursor: grabbing;
    }

    .sprite.selected {
      outline: 1px solid #fff;
      outline-offset: 7px;
    }

    .ui {
      position: fixed;
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      top: max(10px, env(safe-area-inset-top));
      z-index: 9999;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      padding: 0;
      background: transparent;
      border: 0;
    }

    button,
    label.fileButton {
      appearance: none;
      border: 1px solid #fff;
      border-radius: 0;
      background: #000;
      color: #fff;
      padding: 10px 10px;
      font: inherit;
      font-size: 9px;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    button:hover,
    label.fileButton:hover,
    button:focus-visible,
    label.fileButton:focus-visible {
      background: var(--gray);
      color: #fff;
      outline: none;
    }

    button:active,
    label.fileButton:active {
      background: var(--gray);
      transform: translateY(1px);
    }

    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    button.danger:hover,
    button.danger:focus-visible,
    button.danger:active {
      background: var(--gray);
      color: #fff;
      border-color: #fff;
    }

    input[type="file"] {
      position: fixed;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    .rangeWrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: min(100%, 260px);
      flex: 1 1 230px;
      color: #fff;
      font-size: 8px;
      line-height: 1;
      text-transform: uppercase;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #fff;
    }

    .status {
      flex: 1 1 100%;
      color: var(--muted);
      font-size: 8px;
      line-height: 1.55;
      padding-top: 3px;
    }

    .hint {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 100;
      padding: 0;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      pointer-events: none;
      font-size: 8px;
      text-transform: uppercase;
    }

    .hide {
      display: none;
    }

    @media (max-width: 520px) {
      .panel {
        gap: 6px;
      }

      button,
      label.fileButton {
        padding: 9px 8px;
        font-size: 8px;
      }

      .rangeWrap {
        min-width: min(100%, 210px);
        font-size: 7px;
      }

      .status,
      .hint {
        font-size: 7px;
      }

      .sprite {
        width: 140px;
        max-width: calc(100vw - 20px);
        max-height: calc(100vh - 20px);
      }
    }
  </style>
</head>
<body>
  <main id="stage" aria-label="PNG GIF play field"></main>

  <div class="ui">
    <div class="panel">
      <label class="fileButton" for="fileInput">PNG/GIF</label>
      <input id="fileInput" type="file" accept="image/png,image/gif,.png,.gif" multiple />

      <button id="motionButton" type="button">MOTION</button>
      <button id="resetButton" type="button">RESET</button>
      <button id="deleteButton" class="danger" type="button">DEL</button>

      <div class="rangeWrap">
        <span>SHAKE</span>
        <input id="powerRange" type="range" min="0.4" max="3" step="0.1" value="1.4" />
        <span id="powerValue">1.4</span>
      </div>

      <div class="rangeWrap">
        <span>GRAV</span>
        <input id="gravityRange" type="range" min="0" max="2.5" step="0.05" value="0.45" />
        <span id="gravityValue">0.45</span>
      </div>

      <div id="status" class="status">
        LOAD PNG/GIF / TOUCH DRAG / MOTION ON IPHONE
      </div>
    </div>
  </div>

  <div id="hint" class="hint">
    LOAD PNG/GIF<br>
    GRAVITY 0 = NO FALL
  </div>

  <script>
    (() => {
      const stage = document.getElementById("stage");
      const fileInput = document.getElementById("fileInput");
      const motionButton = document.getElementById("motionButton");
      const resetButton = document.getElementById("resetButton");
      const deleteButton = document.getElementById("deleteButton");
      const statusEl = document.getElementById("status");
      const hint = document.getElementById("hint");
      const powerRange = document.getElementById("powerRange");
      const powerValue = document.getElementById("powerValue");
      const gravityRange = document.getElementById("gravityRange");
      const gravityValue = document.getElementById("gravityValue");

      const sprites = [];
      let selected = null;
      let z = 1;
      let motionEnabled = false;
      let lastMotion = null;
      let lastShakeAt = 0;

      let power = Number(powerRange.value);
      let gravity = Number(gravityRange.value);

      // V5: спокойная физика. Главное изменение — почти полностью убрали бесконечную раскрутку.
      const collisionRestitution = 0.18;
      const wallRestitutionX = 0.24;
      const wallRestitutionY = 0.18;
      const airDamping = 0.966;
      const rotationDamping = 0.78;
      const collisionDamping = 0.94;
      const maxSpin = 0.22;

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const rnd = (min, max) => min + Math.random() * (max - min);

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function updateHint() {
        hint.classList.toggle("hide", sprites.length > 0);
      }

      function selectSprite(sprite) {
        if (selected && selected.el) selected.el.classList.remove("selected");
        selected = sprite;
        if (selected && selected.el) selected.el.classList.add("selected");
      }

      function updateSpriteMetrics(sprite) {
        const rect = sprite.el.getBoundingClientRect();
        const w = rect.width || sprite.w || 140;
        const h = rect.height || sprite.h || 140;

        sprite.w = w;
        sprite.h = h;

        // Компактный круглый коллайдер, чтобы прозрачные края PNG/GIF не сталкивались слишком рано.
        sprite.r = Math.max(18, Math.max(w, h) * 0.36);
        sprite.mass = Math.max(1, sprite.r * sprite.r);
      }

      function fitInside(sprite) {
        updateSpriteMetrics(sprite);

        sprite.x = clamp(sprite.x, 0, Math.max(0, window.innerWidth - sprite.w));
        sprite.y = clamp(sprite.y, 0, Math.max(0, window.innerHeight - sprite.h));
      }

      function cx(sprite) {
        return sprite.x + sprite.w / 2;
      }

      function cy(sprite) {
        return sprite.y + sprite.h / 2;
      }

      function renderSprite(sprite) {
        sprite.el.style.transform =
          `translate3d(${sprite.x}px, ${sprite.y}px, 0) rotate(${sprite.rot}deg)`;
      }

      function addSprite(src, name = "MEDIA") {
        const img = document.createElement("img");
        img.className = "sprite";
        img.src = src;
        img.alt = name;
        img.draggable = false;
        img.style.zIndex = ++z;

        const sprite = {
          el: img,
          x: rnd(24, Math.max(25, window.innerWidth - 180)),
          y: rnd(120, Math.max(121, window.innerHeight - 230)),
          vx: rnd(-0.45, 0.45),
          vy: rnd(-0.45, 0.45),
          rot: rnd(-2, 2),
          vr: rnd(-0.015, 0.015),
          w: 140,
          h: 140,
          r: 50,
          mass: 2500,
          dragging: false,
          pointerId: null,
          dragOffsetX: 0,
          dragOffsetY: 0,
          lastDragX: 0,
          lastDragY: 0,
          lastDragT: 0
        };

        img.addEventListener("load", () => {
          fitInside(sprite);
          renderSprite(sprite);
        }, { once: true });

        img.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          img.setPointerCapture(event.pointerId);

          sprite.dragging = true;
          sprite.pointerId = event.pointerId;
          sprite.el.classList.add("dragging");
          sprite.el.style.zIndex = ++z;

          const rect = img.getBoundingClientRect();
          sprite.dragOffsetX = event.clientX - rect.left;
          sprite.dragOffsetY = event.clientY - rect.top;
          sprite.lastDragX = event.clientX;
          sprite.lastDragY = event.clientY;
          sprite.lastDragT = performance.now();

          sprite.vx = 0;
          sprite.vy = 0;
          sprite.vr = 0;

          selectSprite(sprite);
        });

        img.addEventListener("pointermove", (event) => {
          if (!sprite.dragging || event.pointerId !== sprite.pointerId) return;
          event.preventDefault();

          const now = performance.now();
          const dt = Math.max(16, now - sprite.lastDragT);

          const nextX = event.clientX - sprite.dragOffsetX;
          const nextY = event.clientY - sprite.dragOffsetY;

          sprite.vx = (event.clientX - sprite.lastDragX) / dt * 10;
          sprite.vy = (event.clientY - sprite.lastDragY) / dt * 10;

          // От перетаскивания только очень лёгкий поворот.
          sprite.vr = clamp(sprite.vx * .003, -0.08, 0.08);

          sprite.x = nextX;
          sprite.y = nextY;

          fitInside(sprite);
          renderSprite(sprite);

          sprite.lastDragX = event.clientX;
          sprite.lastDragY = event.clientY;
          sprite.lastDragT = now;
        });

        function endDrag(event) {
          if (!sprite.dragging || event.pointerId !== sprite.pointerId) return;

          sprite.dragging = false;
          sprite.pointerId = null;
          sprite.el.classList.remove("dragging");
        }

        img.addEventListener("pointerup", endDrag);
        img.addEventListener("pointercancel", endDrag);
        img.addEventListener("lostpointercapture", () => {
          sprite.dragging = false;
          sprite.pointerId = null;
          sprite.el.classList.remove("dragging");
        });

        img.addEventListener("dblclick", () => {
          removeSprite(sprite);
        });

        sprites.push(sprite);
        stage.appendChild(img);
        selectSprite(sprite);
        updateHint();
        renderSprite(sprite);
      }

      function removeSprite(sprite) {
        const i = sprites.indexOf(sprite);
        if (i !== -1) sprites.splice(i, 1);

        if (sprite.el && sprite.el.parentNode) {
          sprite.el.parentNode.removeChild(sprite.el);
        }

        if (selected === sprite) {
          selected = sprites[sprites.length - 1] || null;
        }

        if (selected) selected.el.classList.add("selected");
        updateHint();
      }

      fileInput.addEventListener("change", () => {
        const files = [...fileInput.files];

        const supported = files.filter(file => {
          const name = file.name.toLowerCase();
          return file.type === "image/png" ||
                 file.type === "image/gif" ||
                 name.endsWith(".png") ||
                 name.endsWith(".gif");
        });

        if (!supported.length) {
          setStatus("PNG/GIF ONLY");
          fileInput.value = "";
          return;
        }

        for (const file of supported) {
          const url = URL.createObjectURL(file);
          addSprite(url, file.name);
        }

        setStatus(`LOADED: ${supported.length}`);
        fileInput.value = "";
      });

      async function enableMotion() {
        try {
          if (typeof DeviceMotionEvent !== "undefined" &&
              typeof DeviceMotionEvent.requestPermission === "function") {
            const permission = await DeviceMotionEvent.requestPermission();

            if (permission !== "granted") {
              setStatus("MOTION DENIED");
              return;
            }
          }

          if (!motionEnabled) {
            window.addEventListener("devicemotion", onDeviceMotion, { passive: true });
            motionEnabled = true;
          }

          motionButton.textContent = "MOTION ON";
          setStatus("MOTION ON");
        } catch (error) {
          setStatus("HTTPS REQUIRED");
          console.error(error);
        }
      }

      motionButton.addEventListener("click", enableMotion);

      function onDeviceMotion(event) {
        const a = event.accelerationIncludingGravity || event.acceleration;
        if (!a) return;

        const x = Number(a.x || 0);
        const y = Number(a.y || 0);
        const zed = Number(a.z || 0);
        const now = performance.now();

        if (!lastMotion) {
          lastMotion = { x, y, z: zed, t: now };
          return;
        }

        const dx = x - lastMotion.x;
        const dy = y - lastMotion.y;
        const dz = zed - lastMotion.z;
        const jerk = Math.sqrt(dx * dx + dy * dy + dz * dz);

        // Наклон iPhone тянет картинки мягко.
        for (const sprite of sprites) {
          if (sprite.dragging) continue;

          sprite.vx += clamp(-x * 0.012 * power, -0.10, 0.10);
          sprite.vy += clamp(y * 0.012 * power, -0.10, 0.10);
        }

        // Встряска. Импульс есть, но вращение почти не добавляется.
        if (jerk > 10.8 && now - lastShakeAt > 190) {
          lastShakeAt = now;
          const impulse = clamp((jerk - 8) * 0.48 * power, 1.8, 9);

          for (const sprite of sprites) {
            if (sprite.dragging) continue;

            sprite.vx += rnd(-impulse, impulse) + dx * 0.26 * power;
            sprite.vy += rnd(-impulse, impulse) - dy * 0.26 * power;

            // Чуть-чуть живого поворота, но не раскрутка.
            sprite.vr += rnd(-0.08, 0.08) * power;
            sprite.vr = clamp(sprite.vr, -maxSpin, maxSpin);
          }

          setStatus(`SHAKE ${jerk.toFixed(1)} / GRAV ${gravity.toFixed(2)}`);
        }

        lastMotion = { x, y, z: zed, t: now };
      }

      function collideSprites() {
        const n = sprites.length;

        for (let i = 0; i < n; i++) {
          const a = sprites[i];

          for (let j = i + 1; j < n; j++) {
            const b = sprites[j];

            const ax = cx(a);
            const ay = cy(a);
            const bx = cx(b);
            const by = cy(b);

            let nx = bx - ax;
            let ny = by - ay;
            let distSq = nx * nx + ny * ny;
            const minDist = a.r + b.r;

            if (distSq >= minDist * minDist) continue;

            let dist = Math.sqrt(distSq);

            if (dist < 0.0001) {
              const angle = rnd(0, Math.PI * 2);
              nx = Math.cos(angle);
              ny = Math.sin(angle);
              dist = 1;
            } else {
              nx /= dist;
              ny /= dist;
            }

            const overlap = minDist - dist;
            const aLocked = a.dragging;
            const bLocked = b.dragging;

            // Мягкое разделение, чтобы не было резкой реакции.
            const separationSoftness = 0.45;

            if (aLocked && !bLocked) {
              b.x += nx * overlap * separationSoftness;
              b.y += ny * overlap * separationSoftness;
            } else if (!aLocked && bLocked) {
              a.x -= nx * overlap * separationSoftness;
              a.y -= ny * overlap * separationSoftness;
            } else if (!aLocked && !bLocked) {
              const totalMass = a.mass + b.mass;
              const aShare = b.mass / totalMass;
              const bShare = a.mass / totalMass;

              a.x -= nx * overlap * aShare * separationSoftness;
              a.y -= ny * overlap * aShare * separationSoftness;
              b.x += nx * overlap * bShare * separationSoftness;
              b.y += ny * overlap * bShare * separationSoftness;
            }

            const rvx = b.vx - a.vx;
            const rvy = b.vy - a.vy;
            const velAlongNormal = rvx * nx + rvy * ny;

            if (velAlongNormal > 0) continue;

            const invMassA = aLocked ? 0 : 1 / a.mass;
            const invMassB = bLocked ? 0 : 1 / b.mass;
            const invMassSum = invMassA + invMassB;

            if (invMassSum === 0) continue;

            const impulse = -(1 + collisionRestitution) * velAlongNormal / invMassSum;
            const impulseX = impulse * nx;
            const impulseY = impulse * ny;

            if (!aLocked) {
              a.vx -= impulseX * invMassA;
              a.vy -= impulseY * invMassA;
            }

            if (!bLocked) {
              b.vx += impulseX * invMassB;
              b.vy += impulseY * invMassB;
            }

            // Столкновения теперь гасят вращение, а не добавляют его.
            a.vr *= 0.45;
            b.vr *= 0.45;

            a.vx *= collisionDamping;
            a.vy *= collisionDamping;
            b.vx *= collisionDamping;
            b.vy *= collisionDamping;
          }
        }

        for (const sprite of sprites) {
          const maxX = Math.max(0, window.innerWidth - sprite.w);
          const maxY = Math.max(0, window.innerHeight - sprite.h);
          sprite.x = clamp(sprite.x, 0, maxX);
          sprite.y = clamp(sprite.y, 0, maxY);
        }
      }

      function bounceFromWalls(sprite) {
        const maxX = Math.max(0, window.innerWidth - sprite.w);
        const maxY = Math.max(0, window.innerHeight - sprite.h);

        if (sprite.x < 0) {
          sprite.x = 0;
          sprite.vx = Math.abs(sprite.vx) * wallRestitutionX;
          sprite.vr *= 0.25;
        } else if (sprite.x > maxX) {
          sprite.x = maxX;
          sprite.vx = -Math.abs(sprite.vx) * wallRestitutionX;
          sprite.vr *= 0.25;
        }

        if (sprite.y < 0) {
          sprite.y = 0;
          sprite.vy = Math.abs(sprite.vy) * wallRestitutionY;
          sprite.vr *= 0.25;
        } else if (sprite.y > maxY) {
          sprite.y = maxY;
          sprite.vy = -Math.abs(sprite.vy) * wallRestitutionY;

          if (Math.abs(sprite.vy) < gravity * 3.4 + 0.8) {
            sprite.vy = 0;
          }

          sprite.vr = 0;
        }
      }

      function tick() {
        for (const sprite of sprites) {
          if (sprite.dragging) continue;

          sprite.vy += gravity;

          sprite.x += sprite.vx;
          sprite.y += sprite.vy;
          sprite.rot += sprite.vr;

          sprite.vx *= airDamping;
          sprite.vy *= airDamping;

          // Очень сильное затухание вращения + жёсткий лимит.
          sprite.vr = clamp(sprite.vr * rotationDamping, -maxSpin, maxSpin);

          bounceFromWalls(sprite);

          if (Math.abs(sprite.vx) < 0.035) sprite.vx = 0;
          if (Math.abs(sprite.vy) < 0.035) sprite.vy = 0;
          if (Math.abs(sprite.vr) < 0.018) sprite.vr = 0;
        }

        collideSprites();

        for (const sprite of sprites) {
          renderSprite(sprite);
        }

        requestAnimationFrame(tick);
      }

      resetButton.addEventListener("click", () => {
        for (const sprite of sprites) {
          sprite.x = rnd(24, Math.max(25, window.innerWidth - 180));
          sprite.y = rnd(120, Math.max(121, window.innerHeight - 230));
          sprite.vx = rnd(-0.45, 0.45);
          sprite.vy = rnd(-0.45, 0.45);
          sprite.rot = rnd(-2, 2);
          sprite.vr = 0;

          fitInside(sprite);
          renderSprite(sprite);
        }

        setStatus("RESET");
      });

      deleteButton.addEventListener("click", () => {
        if (!selected) {
          setStatus("SELECT FILE FIRST");
          return;
        }

        removeSprite(selected);
        setStatus("DELETED");
      });

      powerRange.addEventListener("input", () => {
        power = Number(powerRange.value);
        powerValue.textContent = power.toFixed(1);
      });

      gravityRange.addEventListener("input", () => {
        gravity = Number(gravityRange.value);
        gravityValue.textContent = gravity.toFixed(2);
        setStatus(`GRAV ${gravity.toFixed(2)}`);
      });

      window.addEventListener("resize", () => {
        for (const sprite of sprites) {
          fitInside(sprite);
          renderSprite(sprite);
        }
      });

      // Тест на компьютере: пробел имитирует встряску.
      window.addEventListener("keydown", (event) => {
        if (event.code !== "Space") return;

        for (const sprite of sprites) {
          if (sprite.dragging) continue;

          sprite.vx += rnd(-6, 6) * power;
          sprite.vy += rnd(-6, 6) * power;
          sprite.vr += rnd(-0.08, 0.08) * power;
          sprite.vr = clamp(sprite.vr, -maxSpin, maxSpin);
        }

        setStatus("SPACE SHAKE");
      });

      tick();
      updateHint();
    })();
  </script>
</body>
</html>
